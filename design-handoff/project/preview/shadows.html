<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;display:flex;gap:24px;align-items:center;height:100%;box-sizing:border-box}.el{display:flex;flex-direction:column;align-items:center;gap:10px}.box{width:130px;height:70px;background:var(--panel);border:1px solid var(--border);border-radius:10px}.lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-align:center;line-height:1.4}</style>
</head><body><div class="card">
<div class="el"><div class="box" style="box-shadow:none"></div><span class="lbl">flat<br/>no shadow</span></div>
<div class="el"><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,0.3)"></div><span class="lbl">shadow-sm<br/>buttons, chips</span></div>
<div class="el"><div class="box" style="box-shadow:0 4px 24px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3)"></div><span class="lbl">shadow<br/>floating cards</span></div>
<div class="el"><div class="box" style="box-shadow:0 40px 120px -20px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.2);border:1px solid var(--border-strong)"></div><span class="lbl">shadow-lg<br/>modals</span></div>
<div class="el"><div class="box" style="box-shadow:0 0 40px oklch(0.82 0.12 200 / 0.4);border-color:var(--accent)"></div><span class="lbl">accent-glow<br/>live progress</span></div>
</div></body></html>
