<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.wrap{padding:22px 26px;height:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:center;gap:40px}.mark{display:flex;flex-direction:column;align-items:center;gap:10px}.diamond{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,oklch(0.82 0.12 200),oklch(0.78 0.14 300));display:grid;place-items:center;color:#0a0a0b;font-size:36px;font-weight:700}.word{display:flex;align-items:center;gap:14px}.w-d{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,oklch(0.82 0.12 200),oklch(0.78 0.14 300));display:grid;place-items:center;color:#0a0a0b;font-size:20px;font-weight:700}.n{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.4px}</style>
</head><body><div class="wrap">
<div class="mark"><div class="diamond">◆</div><span class="n">mark</span></div>
<div class="mark"><div class="word"><div class="w-d">◆</div><span style="font-size:28px;font-weight:600;letter-spacing:-0.5px">ShipIt</span></div><span class="n">wordmark</span></div>
<div class="mark"><div class="word" style="background:var(--panel);border:1px solid var(--border-strong);border-radius:14px;padding:10px 16px"><div style="width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,oklch(0.82 0.12 200),oklch(0.78 0.14 300));display:grid;place-items:center;color:#0a0a0b;font-size:11px;font-weight:700">◆</div><span style="font-size:14px;font-weight:600">ShipIt</span></div><span class="n">in-chrome</span></div>
</div></body></html>
