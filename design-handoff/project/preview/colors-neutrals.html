<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;height:100%;box-sizing:border-box}.row{display:flex;gap:14px}.swatch{display:flex;flex-direction:column;gap:6px}.chip{width:80px;height:56px;border-radius:8px;border:1px solid var(--border-strong)}.name{font-size:11px;color:var(--text);font-weight:500}.hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}</style>
</head><body><div class="card">
<div class="row">
  <div class="swatch"><div class="chip" style="background:var(--bg)"></div><span class="name">bg</span><span class="hex">#0a0a0b</span></div>
  <div class="swatch"><div class="chip" style="background:var(--panel)"></div><span class="name">panel</span><span class="hex">#111113</span></div>
  <div class="swatch"><div class="chip" style="background:var(--panel-2)"></div><span class="name">panel-2</span><span class="hex">#16161a</span></div>
  <div class="swatch"><div class="chip" style="background:var(--border)"></div><span class="name">border</span><span class="hex">#1f1f24</span></div>
  <div class="swatch"><div class="chip" style="background:var(--border-strong)"></div><span class="name">border-strong</span><span class="hex">#2a2a31</span></div>
  <div class="swatch"><div class="chip" style="background:var(--text-dim)"></div><span class="name">text-dim</span><span class="hex">#55555d</span></div>
  <div class="swatch"><div class="chip" style="background:var(--text-muted)"></div><span class="name">text-muted</span><span class="hex">#8a8a94</span></div>
  <div class="swatch"><div class="chip" style="background:var(--text)"></div><span class="name">text</span><span class="hex">#ededef</span></div>
</div>
</div></body></html>
