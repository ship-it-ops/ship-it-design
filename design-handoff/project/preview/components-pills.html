<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;height:100%;box-sizing:border-box}.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;font-size:10px;font-weight:500;font-family:var(--font-mono);letter-spacing:.3px;border-radius:999px;border:1px solid var(--border);background:var(--panel-2);color:var(--text-muted)}.dot{display:inline-block;width:6px;height:6px;border-radius:999px;flex-shrink:0}</style>
</head><body><div class="card">
<span class="pill" style="background:oklch(0.82 0.12 200 / 0.13);color:oklch(0.82 0.12 200);border-color:oklch(0.82 0.12 200 / 0.27)">LogicalService</span>
<span class="pill" style="background:oklch(0.78 0.14 300 / 0.13);color:oklch(0.78 0.14 300);border-color:oklch(0.78 0.14 300 / 0.27)">Repository</span>
<span class="pill" style="background:oklch(0.82 0.17 150 / 0.13);color:oklch(0.82 0.17 150);border-color:oklch(0.82 0.17 150 / 0.27)">Deployment</span>
<span class="pill" style="background:oklch(0.82 0.16 75 / 0.13);color:oklch(0.82 0.16 75);border-color:oklch(0.82 0.16 75 / 0.27)">RuntimeService</span>
<span class="pill" style="background:oklch(0.78 0.15 0 / 0.13);color:oklch(0.78 0.15 0);border-color:oklch(0.78 0.15 0 / 0.27)">Team</span>
<span class="pill">Monitor</span>
<span class="pill"><span class="dot" style="background:var(--ok);box-shadow:0 0 8px var(--ok)"></span>healthy</span>
<span class="pill"><span class="dot" style="background:var(--warn)"></span>degraded</span>
<span class="pill"><span class="dot" style="background:var(--err)"></span>error</span>
<span class="pill" style="font-family:var(--font-mono);text-transform:uppercase">tier 1</span>
<span class="pill" style="font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px">required</span>
</div></body></html>
