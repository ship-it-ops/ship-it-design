<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;height:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:center}svg{width:100%;max-width:620px;height:170px}</style>
</head><body><div class="card">
<svg viewBox="0 0 620 170">
  <defs>
    <radialGradient id="g"><stop offset="0" stop-color="oklch(0.82 0.12 200)" stop-opacity="0.3"/><stop offset="1" stop-color="oklch(0.82 0.12 200)" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#1f1f24" stroke-width="0.5"/></pattern>
  </defs>
  <rect width="620" height="170" fill="url(#grid)"/>
  <circle cx="310" cy="85" r="110" fill="url(#g)"/>
  <!-- edges -->
  <g stroke="#2a2a31" stroke-width="0.7" opacity="0.6">
    <line x1="150" y1="60" x2="260" y2="80"/><line x1="260" y1="80" x2="360" y2="60"/>
    <line x1="260" y1="80" x2="360" y2="110"/><line x1="360" y1="110" x2="460" y2="90"/>
    <line x1="260" y1="80" x2="200" y2="120"/><line x1="360" y1="60" x2="460" y2="50"/>
    <line x1="360" y1="110" x2="470" y2="130"/>
  </g>
  <!-- nodes -->
  <g>
    <circle cx="150" cy="60" r="5" fill="oklch(0.78 0.14 300)"/>
    <circle cx="200" cy="120" r="5" fill="oklch(0.82 0.17 150)"/>
    <circle cx="260" cy="80" r="9" fill="oklch(0.82 0.12 200)"/>
    <circle cx="360" cy="60" r="6" fill="oklch(0.82 0.12 200)"/>
    <circle cx="360" cy="110" r="9" fill="oklch(0.82 0.12 200)"/>
    <circle cx="460" cy="50" r="5" fill="oklch(0.78 0.14 300)"/>
    <circle cx="460" cy="90" r="6" fill="oklch(0.82 0.17 150)"/>
    <circle cx="470" cy="130" r="5" fill="oklch(0.82 0.16 75)"/>
  </g>
  <g font-family="Geist Mono" font-size="9" fill="#8a8a94">
    <text x="260" y="97" text-anchor="middle">payments-api</text>
    <text x="360" y="127" text-anchor="middle">checkout-svc</text>
  </g>
</svg>
</div></body></html>
