<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;display:flex;gap:10px;align-items:flex-end;height:100%;box-sizing:border-box}.block{display:flex;flex-direction:column;align-items:center;gap:6px}.box{background:var(--accent);border-radius:4px}.lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-dim)}.r{display:flex;flex-direction:column;align-items:center;gap:6px}.radius{width:56px;height:56px;background:var(--panel-2);border:1px solid var(--border-strong)}</style>
</head><body><div class="card">
<div class="block"><div class="box" style="width:4px;height:4px"></div><span class="lbl">1 · 4px</span></div>
<div class="block"><div class="box" style="width:8px;height:8px"></div><span class="lbl">2 · 8</span></div>
<div class="block"><div class="box" style="width:12px;height:12px"></div><span class="lbl">3 · 12</span></div>
<div class="block"><div class="box" style="width:16px;height:16px"></div><span class="lbl">4 · 16</span></div>
<div class="block"><div class="box" style="width:22px;height:22px"></div><span class="lbl">5 · 22</span></div>
<div class="block"><div class="box" style="width:28px;height:28px"></div><span class="lbl">6 · 28</span></div>
<div class="block"><div class="box" style="width:40px;height:40px"></div><span class="lbl">8 · 40</span></div>
<div style="width:24px"></div>
<div class="r"><div class="radius" style="border-radius:4px"></div><span class="lbl">xs · 4</span></div>
<div class="r"><div class="radius" style="border-radius:6px"></div><span class="lbl">sm · 6</span></div>
<div class="r"><div class="radius" style="border-radius:8px"></div><span class="lbl">md · 8</span></div>
<div class="r"><div class="radius" style="border-radius:10px"></div><span class="lbl">· 10</span></div>
<div class="r"><div class="radius" style="border-radius:14px"></div><span class="lbl">lg · 14</span></div>
<div class="r"><div class="radius" style="border-radius:18px"></div><span class="lbl">xl · 18</span></div>
</div></body></html>
