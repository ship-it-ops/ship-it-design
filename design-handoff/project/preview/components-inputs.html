<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;display:flex;flex-direction:column;gap:10px;height:100%;box-sizing:border-box}.field{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13px}.field.focus{border-color:var(--accent);box-shadow:0 0 0 3px oklch(0.82 0.12 200 / 0.2)}.hint{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);padding:2px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;margin-left:auto}.placeholder{color:var(--text-dim)}.ask{background:var(--panel);border:1px solid var(--border-strong);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;font-size:15px}</style>
</head><body><div class="card">
<div class="field"><span class="placeholder">acme</span><span style="color:var(--text-dim);font-family:var(--font-mono)">.shipit.ai</span></div>
<div class="field focus"><span style="color:var(--text)">payments-api</span><span class="hint">⌘K</span></div>
<div class="ask"><span style="color:var(--accent)">✦</span><span style="flex:1;color:var(--text-dim)">Ask your graph anything…</span><span class="hint">⌘ ↵</span></div>
</div></body></html>
