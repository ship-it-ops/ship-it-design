<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;display:flex;flex-wrap:wrap;gap:22px;align-items:center;height:100%;box-sizing:border-box;font-size:22px;color:var(--text-muted)}.g{display:flex;flex-direction:column;align-items:center;gap:4px;width:54px}.n{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;text-align:center}</style>
</head><body><div class="card">
<div class="g"><span>◆</span><span class="n">brand · tier1</span></div>
<div class="g"><span>◇</span><span class="n">tier2</span></div>
<div class="g"><span>✦</span><span class="n">ask</span></div>
<div class="g"><span>◎</span><span class="n">incident</span></div>
<div class="g"><span>⌁</span><span class="n">connect</span></div>
<div class="g"><span>⋈</span><span class="n">graph</span></div>
<div class="g"><span>◱</span><span class="n">home</span></div>
<div class="g"><span>≡</span><span class="n">schema</span></div>
<div class="g"><span>→</span><span class="n">arrow</span></div>
<div class="g"><span>↗</span><span class="n">trend up</span></div>
<div class="g"><span>✓</span><span class="n">check</span></div>
<div class="g"><span>×</span><span class="n">close</span></div>
<div class="g"><span>⎔</span><span class="n">k8s</span></div>
<div class="g"><span>◉</span><span class="n">datadog</span></div>
<div class="g"><span>▨</span><span class="n">backstage</span></div>
<div class="g"><span>◔</span><span class="n">pagerduty</span></div>
<div class="g"><span>⌨</span><span class="n">github</span></div>
</div></body></html>
