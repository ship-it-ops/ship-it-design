<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;height:100%;box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:center}.ex{padding:14px 16px;background:var(--panel-2);border:1px solid var(--border);border-radius:10px}.lbl{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:6px}.yes{font-size:14px;color:var(--text)}.no{font-size:14px;color:var(--text-dim);text-decoration:line-through}</style>
</head><body><div class="card">
<div class="ex"><div class="lbl">voice · yes</div><div class="yes">"Let's give your graph a home."</div></div>
<div class="ex"><div class="lbl">voice · no</div><div class="no">"Welcome to ShipIt! Get started."</div></div>
<div class="ex"><div class="lbl">voice · yes</div><div class="yes">"We poked around while you weren't watching."</div></div>
<div class="ex"><div class="lbl">voice · no</div><div class="no">"Your data has been scanned for insights."</div></div>
<div class="ex"><div class="lbl">voice · yes</div><div class="yes">"3 things your team didn't know."</div></div>
<div class="ex"><div class="lbl">voice · no</div><div class="no">"AI-powered insights across your org."</div></div>
</div></body></html>
