<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card{padding:22px 26px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;height:100%;box-sizing:border-box}.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--panel-2);color:var(--text)}.btn.primary{background:var(--accent);color:#0a0a0b;border-color:var(--accent)}.btn.ghost{background:transparent}.btn.sm{padding:5px 10px;font-size:11px}</style>
</head><body><div class="card">
<div class="btn primary">Build graph →</div>
<div class="btn">Cancel</div>
<div class="btn ghost">skip</div>
<div class="btn primary sm">continue →</div>
<div class="btn sm">← back</div>
<div class="btn sm ghost">Skip</div>
<div class="btn" style="opacity:0.4;pointer-events:none">Disabled</div>
<div class="btn primary" style="box-shadow:0 0 0 3px oklch(0.82 0.12 200 / 0.25)">Focused</div>
</div></body></html>
