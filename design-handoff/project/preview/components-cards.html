<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%}.card-wrap{padding:22px 26px;display:flex;gap:14px;align-items:flex-start;height:100%;box-sizing:border-box}.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;width:240px}.eyebrow{font-family:var(--font-mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:8px}.title{font-size:15px;font-weight:500;margin-bottom:6px}.sub{font-size:12px;color:var(--text-muted);line-height:1.5}.row{display:flex;padding:5px 0;font-size:11px;font-family:var(--font-mono);border-bottom:1px solid var(--border)}.k{color:var(--text-dim);width:70px}.v{color:var(--text);flex:1}</style>
</head><body><div class="card-wrap">
<div class="card">
  <div class="eyebrow">Tier 1 · live</div>
  <div class="title">payments-api</div>
  <div class="sub">Handles card auth, refunds, settlement.</div>
</div>
<div class="card" style="padding:14px 16px">
  <div class="row"><span class="k">owner</span><span class="v">payments-team</span></div>
  <div class="row"><span class="k">runtime</span><span class="v">k8s</span></div>
  <div class="row"><span class="k">sla</span><span class="v" style="color:var(--accent)">99.95%</span></div>
  <div class="row" style="border:none"><span class="k">deps</span><span class="v">14</span></div>
</div>
<div class="card" style="background:var(--panel-2);border-style:dashed">
  <div class="eyebrow" style="color:var(--text-dim)">empty state</div>
  <div class="sub">No claims to reconcile — everyone agrees.</div>
</div>
</div></body></html>
