<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShipIt-AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Geist', 'Inter', system-ui, sans-serif;
    background: var(--bg, #0a0a0b);
    color: var(--text, #ededef);
    font-feature-settings: 'cv11', 'ss01';
  }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2a2a31; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes slidein { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadein 0.35s ease-out both; }
  .slide-in { animation: slidein 0.25s ease-out both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/theme.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/page-home.jsx"></script>
<script type="text/babel" src="app/page-graph.jsx"></script>
<script type="text/babel" src="app/page-ask.jsx"></script>
<script type="text/babel" src="app/page-connectors.jsx"></script>
<script type="text/babel" src="app/page-incident.jsx"></script>
<script type="text/babel" src="app/page-entity.jsx"></script>
<script type="text/babel" src="app/onboarding.jsx"></script>
<script type="text/babel" src="app/tweaks.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
