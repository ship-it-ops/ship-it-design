name: Bug report
description: Something broke or behaves unexpectedly in @ship-it-ui/*.
labels: ['bug', 'needs triage']
body:
  - type: input
    id: package
    attributes:
      label: Package
      description: Which `@ship-it-ui/*` package is affected? (tokens / icons / ui / shipit)
      placeholder: '@ship-it-ui/ui'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: '0.0.1'
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest possible component / app that demonstrates the bug. A CodeSandbox or StackBlitz link is ideal.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Node version, framework (Next.js / Vite / Remix / etc.), browser, anything else relevant.
      placeholder: |
        - Node: 20.x
        - Framework: Next.js 15 (App Router)
        - Browser: Chrome 130
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Console errors, screenshots, related issues, workarounds you've tried.
