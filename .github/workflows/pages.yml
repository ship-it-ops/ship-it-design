name: Deploy docs-site to Pages

# Builds the static Next.js docs from `apps/docs-site/` and publishes it to
# GitHub Pages on every push to `main`. Pages must be enabled in the repo
# settings: Settings → Pages → Source: "GitHub Actions".
#
# The site is served at `https://<owner>.github.io/<repo>/`. The build sets
# `NEXT_PUBLIC_BASE_PATH` so all asset paths inside the static export resolve
# under that subpath.
#
# On pull_request the workflow runs the same build (with the same env) but
# stops before the deploy step — that way any change that would break the
# Pages publish surfaces on the PR before merge.

on:
  push:
    branches: [main]
  pull_request:
    # Only re-validate the docs site on PRs that could actually affect the
    # build. Anything outside this list skips the Pages job entirely.
    paths:
      - 'apps/docs-site/**'
      - 'packages/tokens/**'
      - 'packages/icons/**'
      - 'packages/ui/**'
      - 'packages/shipit/**'
      - 'packages/tsconfig/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/pages.yml'
      - '.github/actions/setup/**'
  # Allow manual republish (e.g. after enabling Pages for the first time).
  workflow_dispatch:

# Pages deploys require these permissions on the deploying job.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy can run at a time. Don't cancel an in-flight deploy
# (it'd leave the live site in an inconsistent state); queue instead. PR
# builds use a separate group keyed by the PR number so they can cancel
# in-flight on new pushes without blocking the live deploy lane.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pages-pr-{0}', github.event.pull_request.number) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build docs-site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      # `turbo run build --filter=docs-site` builds every upstream workspace
      # dependency first (tokens → icons → ui → shipit) per
      # `dependsOn: ["^build"]`, then docs-site. Without this, Next.js fails
      # to resolve `@ship-it-ui/ui` because its `dist/` doesn't exist.
      - name: Build docs-site (with subpath base)
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm exec turbo run build --filter=docs-site

      # Verify the build actually produced an `index.html`. PR builds skip
      # `upload-pages-artifact` (no `if-no-files-found: error` safety net),
      # so without this check a regression that empties `out/` would pass PR
      # CI silently and only blow up on the main deploy.
      - name: Verify static export exists
        run: |
          if [ ! -f apps/docs-site/out/index.html ]; then
            echo "::error::out/index.html missing — Next.js export produced no output."
            exit 1
          fi

      # Skip Pages-specific upload on PR runs — they're build-only.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/docs-site/out

  deploy:
    name: Deploy to Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Single-flighted via the workflow-level `concurrency` block above
    # (group `pages`, cancel-in-progress: false on push). Don't add a
    # job-level `concurrency: { group: pages }` here — that re-requests the
    # same lock the workflow already holds and triggers a self-deadlock that
    # GitHub cancels with "deadlock detected for concurrency group: 'pages'".
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
