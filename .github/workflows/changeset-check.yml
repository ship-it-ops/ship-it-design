name: Changeset

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    # The gate only matters for PRs that change publishable code. Docs,
    # workflow definitions, license/editorconfig, and the audit folder
    # never require a changeset, so skip the runner entirely on those.
    # PRs that touch a mix (e.g. workflows + packages/) still fire because
    # not every changed path matches the ignore list.
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'apps/docs/**'
      - 'audit/**'
      - '**.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.npmrc'
      - '.nvmrc'

# Block PRs that change `packages/*` but don't add a `.changeset/*.md`.
# Authors can opt-out for non-shipping changes (refactors, ci, internal docs)
# by labelling the PR `no-changeset`.

concurrency:
  group: changeset-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  required:
    name: Changeset required for package changes
    runs-on: ubuntu-latest
    # Skip in three cases:
    #   1. The PR title starts with `chore` (deps, ci, refactors, the
    #      changesets-bot release PR itself) — these never ship consumer-
    #      visible changes, so requiring a changeset on them is noise.
    #   2. The `no-changeset` label is present (manual opt-out for
    #      non-shipping PRs that don't fit the `chore` convention).
    #   3. The triggering event is a label add/remove for any label OTHER
    #      than `no-changeset` (e.g. `release: snapshot`, `help wanted`) —
    #      without this guard every label change would spin up a runner.
    if: |
      !startsWith(github.event.pull_request.title, 'chore') &&
      !contains(github.event.pull_request.labels.*.name, 'no-changeset') &&
      (
        (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
        github.event.label.name == 'no-changeset'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need the full history so `changeset status --since=origin/main`
          # can compare against the merge base.
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Verify a changeset accompanies package changes
        # Exits non-zero when packages have changed without a corresponding
        # `.changeset/*.md` file. Ignores the `docs` app (excluded in
        # .changeset/config.json's `ignore` list) and any package marked
        # `private: true`.
        run: pnpm changeset status --since=origin/${{ github.event.pull_request.base.ref }}
