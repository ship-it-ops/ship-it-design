name: Claude Code

# Responds when a human writes `@claude` in a PR / issue / review comment.
# Pairs with `claude-code-review.yml` (the unattended pass on every PR).
#
# Auth: uses the `CLAUDE_CODE_OAUTH_TOKEN` repo/org secret + the Claude
# GitHub App installed on the org. No `ANTHROPIC_API_KEY` needed.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    name: Run Claude
    # Only fire when `@claude` actually appears in the body of the trigger event.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # comment back, propose changes
      issues: write # respond on issues
      id-token: write # required by the Anthropic action's OIDC handshake
      actions: read # read previous run logs when asked
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Claude Code
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Open up the gh CLI for read + comment-back operations. Add more
          # tools here as you find genuine repeated need (e.g., `gh pr edit`,
          # `gh workflow run`); avoid blanket allow-listing.
          claude_args: |
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh pr comment:*),Bash(gh run view:*),Bash(gh run list:*)"
