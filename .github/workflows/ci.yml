name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'audit/**'
      - '**.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'audit/**'
      - '**.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Granted to all jobs; some pipelines (snapshot, release, attestations) need
# `id-token: write` and `contents: read` is the minimum for checkout.
permissions:
  contents: read

env:
  # Disable Turbo telemetry in CI.
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  # ── Stage 1: linters that don't need a build ──────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm lint

  # ── Stage 2: workspace verification (typecheck + test + build) ────────────
  # Single job because turbo already parallelizes within a job and the
  # tasks share `^build` dependencies; splitting would force re-installs
  # and thrash the dependency cache.
  #
  # Matrix on Node versions consistent with `engines.node: ">=24"` plus the
  # last Active LTS (22) as a forward-compat hedge. Node 20 dropped on
  # 2026-04-30 (its EOL date) and because docs-site generators rely on
  # `--experimental-strip-types`, which only landed in 22.6+. Dist artifacts
  # only upload from the Node 24 leg (the default dev runtime, per `.nvmrc`)
  # so we don't ship N copies of the same bundle.
  verify:
    name: Typecheck · Test · Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node-version }}-
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Surface coverage as a PR artifact so reviewers can inspect uncovered
      # branches without having to re-run the suite locally. Only fired by the
      # vitest configs in `packages/*/vitest.config.ts`; `if-no-files-found:
      # ignore` keeps this step quiet when a package opts out.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-node${{ matrix.node-version }}
          path: packages/*/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: pnpm build

      # Surface the static docs export from CI so it's inspectable on a PR.
      # Only upload from the canonical Node version to avoid N duplicate artifacts.
      - name: Upload docs-site artifact
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-site
          path: apps/docs-site/out
          retention-days: 14
          if-no-files-found: error

      # Ship the built lib bundles too — handy when reviewing dist-shape diffs.
      - name: Upload package dist artifacts
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package-dists
          path: |
            packages/tokens/dist
            packages/icons/dist
            packages/ui/dist
            packages/shipit/dist
          retention-days: 14
          if-no-files-found: error

  # ── Stage 3: Claude PR review (only after format + lint + verify pass) ────
  # Pairs with `claude.yml` (the reactive `@claude` mention handler).
  # Apply the `skip-claude` label to opt out of a specific PR.
  claude-review:
    name: Review with Claude
    needs: [format, lint, verify]
    runs-on: ubuntu-latest
    # Skip pushes to main, drafts, the auto-generated "Version Packages" PR,
    # dependabot/renovate mechanical bumps, and anything labelled `skip-claude`.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-claude') &&
      !startsWith(github.event.pull_request.title, 'chore(release): version packages') &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'renovate[bot]'
    permissions:
      contents: read
      pull-requests: write # post inline + summary review comments
      issues: read # read linked issues for context
      id-token: write # OIDC handshake with the Anthropic action
      actions: read # read prior CI runs to ground review feedback
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so the action can compute a clean diff against the
          # base branch instead of a shallow shadow.
          fetch-depth: 0

      # The Claude action only runs against the workflow definition on the
      # default branch — a security measure so a PR can't modify the prompt
      # to exfiltrate secrets. If this PR touches `ci.yml` itself (the file
      # that defines this job), skip the review with an explanatory comment
      # instead of letting the action fail.
      - name: Detect changes to this workflow file
        id: workflow_check
        run: |
          base="${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "origin/$base...HEAD" -- .github/workflows/ci.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post skip notice (this workflow modified)
        if: steps.workflow_check.outputs.changed == 'true'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const marker = '<!-- claude-review-skip-workflow-changed -->';
            const body = [
              marker,
              '⏭️ **Claude review skipped on this PR**',
              '',
              'This PR modifies `.github/workflows/ci.yml`, the workflow that defines this review. The automated review only runs against the workflow definition on the default branch (a safety guard so a PR cannot rewrite its own reviewer prompt), so it is suppressed here.',
              '',
              'Once this PR is merged into `main`, future PRs will be reviewed against the updated workflow. You can mention `@claude` in a comment if you want a manual review on this PR.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # Fetch the ship-reviewed-prs skill from the central ship-code repo and
      # install it into this workspace under `.claude/skills/` so the Claude
      # action's CLI auto-discovers it. Pinned to a specific commit hash so
      # the skill version is reproducible — updates require a deliberate PR
      # to bump this `ref:` (and ideally a side-by-side comparison on a
      # representative PR before adoption).
      - name: Fetch ship-reviewed-prs skill
        if: steps.workflow_check.outputs.changed != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ship-it-ops/ship-code
          ref: 6d42693329a713985b611a5fe668104358e06e0b # main @ 2026-05-17
          path: .ship-code
          sparse-checkout: |
            skills/ship-reviewed-prs
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Install ship-reviewed-prs skill into workspace
        if: steps.workflow_check.outputs.changed != 'true'
        run: |
          mkdir -p .claude/skills
          cp -r .ship-code/skills/ship-reviewed-prs .claude/skills/
          echo "Installed skill:"
          ls -la .claude/skills/ship-reviewed-prs/

      - name: Claude Code Review
        if: steps.workflow_check.outputs.changed != 'true'
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use sticky_comment so subsequent pushes update the same review
          # summary thread instead of spamming a new top-level comment per
          # commit. Inline comments are landed via the github_inline_comment
          # MCP tool, which is allow-listed below.
          use_sticky_comment: true
          claude_args: |
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh pr checks:*),Bash(gh run view:*),Bash(gh run list:*),Bash(gh api:*)"
          prompt: |
            Review this pull request using the **`ship-reviewed-prs`**
            skill installed at `.claude/skills/ship-reviewed-prs/`. Invoke
            it via the Skill tool with this PR's URL as the argument.

            **Before forming any findings, read
            `.claude/ship-reviewed-prs-overrides.md`.** It carries this
            repo's tribal knowledge — token architecture
            (`globals.css` `@theme inline` block), v0 changeset policy,
            "no Storybook" file convention, forwardRef/cva conventions,
            won't-fix marker set, DA/IN-deep conditional triggers tuned
            for tokens + icon manifest + entity types, `ci_max_decision:
            COMMENT` (the bot is non-blocking), and the
            generated/vendored skip list — and overrides the skill's
            defaults where they apply.

            The skill manages personas, lifecycle classification,
            fingerprint suppression, the deterministic decision matrix,
            and the structured output format. Your job is to invoke it
            correctly, apply the overrides, and submit via
            `create_inline_comment` (line-specific findings) + the
            sticky summary comment (verdict, delegations, lifecycle
            counts, What's-solid).

            Verdict is one of `LGTM`, `LGTM with nits`, `Needs work`.

            ## When to approve

            If the verdict is **`LGTM`** or **`LGTM with nits`** *and* CI on
            the PR head is green, submit a real GitHub approval review
            instead of leaving the verdict in the sticky summary alone:

            ```bash
            PR=$(gh pr view --json number -q .number)
            gh api "repos/$GITHUB_REPOSITORY/pulls/$PR/reviews" \
              -X POST \
              -f event=APPROVE \
              -f body="LGTM — <one-line reason>. See the review summary above for details."
            ```

            **All of these must hold before you approve.** If any fails,
            skip the approval and let the sticky summary stand:

            1. **Zero Must-fix items.** Should-fix items also block
               approval — those are ship-blockers by definition.
            2. **Nits are fine.** They don't block.
            3. **CI is green on the head commit.** Run
               `gh pr checks --watch=false` (or `gh run list --branch
               <head-ref> --limit 5`) and confirm. If you can't determine
               status, do not approve.
            4. **Diff is non-trivial.** Don't approve an empty / pure-revert
               PR — let a human handle it.
            5. **Not your own work.** If the PR author is `claude[bot]` or
               your prior turn pushed commits to the branch in this same
               session, do not self-approve.
            6. **No `chore(release): version packages` PRs** (Changesets
               release PRs need a human signoff regardless of CI).

            Never use `REQUEST_CHANGES` — Must/Should-fix comments already
            communicate severity to the human reviewer, and blocking
            merges from a bot is poor ergonomics in repos with branch
            protection. `event=APPROVE` or `event=COMMENT` (default for
            sticky-only feedback) are the only events to use.

            On a re-review pass where prior rounds flagged items and the
            author resolved them, an approval is the right close-out
            signal — better than just removing the items from the sticky
            summary.

            ## What NOT to comment on

            - Style nits Prettier / ESLint already covers
            - Tailwind class order (`prettier-plugin-tailwindcss` owns it)
            - The size of the diff — big PRs are fine when cohesive
            - Patch-vs-minor severity (see hard rule #5)
            - Missing `.stories.tsx` (see hard rule #4)
            - Anything you're <75% sure about (see hard rule #3)
