name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'audit/**'
      - '**.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'audit/**'
      - '**.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Granted to all jobs; some pipelines (snapshot, release, attestations) need
# `id-token: write` and `contents: read` is the minimum for checkout.
permissions:
  contents: read

env:
  # Disable Turbo telemetry in CI.
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  # ── Stage 1: linters that don't need a build ──────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm lint

  # ── Stage 2: workspace verification (typecheck + test + build) ────────────
  # Single job because turbo already parallelizes within a job and the
  # tasks share `^build` dependencies; splitting would force re-installs
  # and thrash the dependency cache.
  #
  # Matrix on Node versions consistent with `engines.node: ">=24"` plus the
  # last Active LTS (22) as a forward-compat hedge. Node 20 dropped on
  # 2026-04-30 (its EOL date) and because docs-site generators rely on
  # `--experimental-strip-types`, which only landed in 22.6+. Dist artifacts
  # only upload from the Node 24 leg (the default dev runtime, per `.nvmrc`)
  # so we don't ship N copies of the same bundle.
  verify:
    name: Typecheck · Test · Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node-version }}-
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Surface coverage as a PR artifact so reviewers can inspect uncovered
      # branches without having to re-run the suite locally. Only fired by the
      # vitest configs in `packages/*/vitest.config.ts`; `if-no-files-found:
      # ignore` keeps this step quiet when a package opts out.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-node${{ matrix.node-version }}
          path: packages/*/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: pnpm build

      # Surface the static docs export from CI so it's inspectable on a PR.
      # Only upload from the canonical Node version to avoid N duplicate artifacts.
      - name: Upload docs-site artifact
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-site
          path: apps/docs-site/out
          retention-days: 14
          if-no-files-found: error

      # Ship the built lib bundles too — handy when reviewing dist-shape diffs.
      - name: Upload package dist artifacts
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package-dists
          path: |
            packages/tokens/dist
            packages/icons/dist
            packages/ui/dist
            packages/shipit/dist
          retention-days: 14
          if-no-files-found: error

  # ── Stage 3: Claude PR review (only after format + lint + verify pass) ────
  # Pairs with `claude.yml` (the reactive `@claude` mention handler).
  # Skill source: https://github.com/ship-it-ops/ship-code/tree/main/skills/ship-reviewed-prs
  # The skill (personas, lifecycle, decision matrix, approval rules, what
  # NOT to comment on) is the source of truth and is maintained centrally.
  # Local tribal knowledge belongs in `.claude/ship-reviewed-prs-overrides.md`
  # — the skill auto-discovers it. Apply the `skip-claude` label to opt out
  # of a specific PR.
  claude-review:
    name: Review with Claude
    needs: [format, lint, verify]
    runs-on: ubuntu-latest
    # Skip pushes to main, drafts, bot-authored PRs (dependabot, renovate,
    # the changesets release PR opened by github-actions), and anything
    # labelled `skip-claude`.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-claude')
    permissions:
      contents: read
      pull-requests: write # post inline + summary review comments
      issues: write # auto-resolve own threads + post lifecycle replies
      id-token: write # OIDC handshake with the Anthropic action
      actions: read # read prior CI runs to ground review feedback
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the workflow-change diff below can compare
          # against the base ref.
          fetch-depth: 0

      # The Claude action only runs against the workflow definition on the
      # default branch — a security measure so a PR can't modify the prompt
      # to exfiltrate secrets. If this PR touches `ci.yml` itself (the file
      # that defines this job), skip the review with an explanatory comment
      # instead of letting the action fail.
      - name: Detect changes to this workflow file
        id: workflow_check
        run: |
          base="${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "origin/$base...HEAD" -- .github/workflows/ci.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post skip notice (this workflow modified)
        if: steps.workflow_check.outputs.changed == 'true'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const marker = '<!-- claude-review-skip-workflow-changed -->';
            const body = [
              marker,
              '⏭️ **Claude review skipped on this PR**',
              '',
              'This PR modifies `.github/workflows/ci.yml`, the workflow that defines this review. The automated review only runs against the workflow definition on the default branch (a safety guard so a PR cannot rewrite its own reviewer prompt), so it is suppressed here.',
              '',
              'Once this PR is merged into `main`, future PRs will be reviewed against the updated workflow. You can mention `@claude` in a comment if you want a manual review on this PR.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Run Claude Code Review
        if: steps.workflow_check.outputs.changed != 'true'
        uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1
        env:
          # The ship-reviewed-prs skill auto-detects CI mode from CI=true
          # (set by GitHub Actions) and submits the review via `gh`. Give
          # gh the default workflow token — same scope the rest of CI uses.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Sticky comment so subsequent pushes update the same review
          # summary thread instead of spamming a new top-level comment per
          # commit.
          use_sticky_comment: true
          # Pull the ship-reviewed-prs skill from the ship-it-ops/ship-code
          # marketplace. The skill owns persona orchestration, comment
          # lifecycle classification, fingerprint suppression, the
          # deterministic APPROVE/REQUEST_CHANGES/COMMENT decision, and
          # submission via gh. Repo-local overrides (token architecture,
          # changeset policy, conditional persona triggers, ci_max_decision,
          # vendored skip list) live in `.claude/ship-reviewed-prs-overrides.md`
          # and are auto-discovered by the skill.
          plugin_marketplaces: 'https://github.com/ship-it-ops/ship-code.git'
          plugins: 'ship-reviewed-prs@ship-code'
          # Skill default exit codes: REQUEST_CHANGES → 1 (fails the job),
          # APPROVE/COMMENT → 0. Append `--strict` if COMMENT should also
          # fail the job.
          prompt: '/ship-reviewed-prs ${{ github.event.pull_request.number }}'
