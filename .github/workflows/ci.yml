name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'audit/**'
      - '**.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'audit/**'
      - '**.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Granted to all jobs; some pipelines (snapshot, release, attestations) need
# `id-token: write` and `contents: read` is the minimum for checkout.
permissions:
  contents: read

env:
  # Disable Turbo telemetry in CI.
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  # ── Stage 1: linters that don't need a build ──────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm lint

  # ── Stage 2: workspace verification (typecheck + test + build) ────────────
  # Single job because turbo already parallelizes within a job and the
  # tasks share `^build` dependencies; splitting would force re-installs
  # and thrash the dependency cache.
  #
  # Matrix on Node versions consistent with `engines.node: ">=24"` plus the
  # last Active LTS (22) as a forward-compat hedge. Node 20 dropped on
  # 2026-04-30 (its EOL date) and because docs-site generators rely on
  # `--experimental-strip-types`, which only landed in 22.6+. Dist artifacts
  # only upload from the Node 24 leg (the default dev runtime, per `.nvmrc`)
  # so we don't ship N copies of the same bundle.
  verify:
    name: Typecheck · Test · Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node-version }}-
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Surface coverage as a PR artifact so reviewers can inspect uncovered
      # branches without having to re-run the suite locally. Only fired by the
      # vitest configs in `packages/*/vitest.config.ts`; `if-no-files-found:
      # ignore` keeps this step quiet when a package opts out.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-node${{ matrix.node-version }}
          path: packages/*/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: pnpm build

      # Surface the static docs export from CI so it's inspectable on a PR.
      # Only upload from the canonical Node version to avoid N duplicate artifacts.
      - name: Upload docs-site artifact
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-site
          path: apps/docs-site/out
          retention-days: 14
          if-no-files-found: error

      # Ship the built lib bundles too — handy when reviewing dist-shape diffs.
      - name: Upload package dist artifacts
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package-dists
          path: |
            packages/tokens/dist
            packages/icons/dist
            packages/ui/dist
            packages/shipit/dist
          retention-days: 14
          if-no-files-found: error

  # ── Stage 3: Claude PR review (only after format + lint + verify pass) ────
  # Pairs with `claude.yml` (the reactive `@claude` mention handler).
  # Apply the `skip-claude` label to opt out of a specific PR.
  claude-review:
    name: Review with Claude
    needs: [format, lint, verify]
    runs-on: ubuntu-latest
    # Skip pushes to main, drafts, the auto-generated "Version Packages" PR,
    # dependabot/renovate mechanical bumps, and anything labelled `skip-claude`.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-claude') &&
      !startsWith(github.event.pull_request.title, 'chore(release): version packages') &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'renovate[bot]'
    permissions:
      contents: read
      pull-requests: write # post inline + summary review comments
      issues: read # read linked issues for context
      id-token: write # OIDC handshake with the Anthropic action
      actions: read # read prior CI runs to ground review feedback
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so the action can compute a clean diff against the
          # base branch instead of a shallow shadow.
          fetch-depth: 0

      # The Claude action only runs against the workflow definition on the
      # default branch — a security measure so a PR can't modify the prompt
      # to exfiltrate secrets. If this PR touches `ci.yml` itself (the file
      # that defines this job), skip the review with an explanatory comment
      # instead of letting the action fail.
      - name: Detect changes to this workflow file
        id: workflow_check
        run: |
          base="${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "origin/$base...HEAD" -- .github/workflows/ci.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post skip notice (this workflow modified)
        if: steps.workflow_check.outputs.changed == 'true'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const marker = '<!-- claude-review-skip-workflow-changed -->';
            const body = [
              marker,
              '⏭️ **Claude review skipped on this PR**',
              '',
              'This PR modifies `.github/workflows/ci.yml`, the workflow that defines this review. The automated review only runs against the workflow definition on the default branch (a safety guard so a PR cannot rewrite its own reviewer prompt), so it is suppressed here.',
              '',
              'Once this PR is merged into `main`, future PRs will be reviewed against the updated workflow. You can mention `@claude` in a comment if you want a manual review on this PR.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Claude Code Review
        if: steps.workflow_check.outputs.changed != 'true'
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use sticky_comment so subsequent pushes update the same review
          # summary thread instead of spamming a new top-level comment per
          # commit. Inline comments are landed via the github_inline_comment
          # MCP tool, which is allow-listed below.
          use_sticky_comment: true
          claude_args: |
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh run view:*),Bash(gh run list:*)"
          prompt: |
            Review this pull request as the most senior engineer on the
            ShipIt design-system team. Use `create_inline_comment` for
            line-specific issues; use the sticky summary comment for the
            overall verdict and high-level remarks.

            ## What this repo is

            A pnpm + turbo monorepo shipping four npm packages under
            `@ship-it-ui/*` (tokens, icons, ui, shipit) plus a Next.js
            docs site at `apps/docs-site/`. Stack: React 18+, TypeScript
            5.x, Tailwind v4 (beta), Radix UI primitives, `cva` for
            variants, `tsup` for library builds, Vitest + `vitest-axe`
            for tests. **No Storybook** — visual surfaces live in
            `apps/docs-site/examples/{component}/{variant}.tsx` (e.g.
            `apps/docs-site/examples/nav-bar/horizontal.tsx`).

            ## Hard rules (read first, every time)

            **1. Verify before flagging.** Before you raise an issue,
            actually read the cited file. If you claim "X is undefined"
            or "Y doesn't exist", grep / read both the package source
            AND `packages/ui/src/styles/globals.css` (Tailwind v4
            `@theme inline` block — many tokens like `--color-on-accent`
            live ONLY there, NOT in `tokens.css`). Token
            architecture: primitives → semantic in
            `packages/tokens/src/color.ts`, then re-bound to Tailwind via
            `@theme inline` in `globals.css`.

            **2. Don't re-flag what's already settled.** This action
            re-runs on every push (`synchronize`). Before posting a
            comment, fetch existing PR review threads
            (`gh pr view --json reviews,comments` or read the diff
            against the prior review). If a previous round flagged the
            same issue and the author replied with a rebuttal or fixed
            it, do NOT raise it again — even on a new line. Posting the
            same critique on a fresh thread is the worst noise we
            generate.

            **3. Confidence threshold.** Only flag issues you're ≥75%
            sure about. If you're guessing, either skip it or label it
            "low confidence — verify". Bots cause more harm by crying
            wolf than by missing things.

            **4. No Storybook in this repo.** Don't ask for
            `Component.stories.tsx`. The repo migrated away from
            Storybook in `chore: rework docs`. Visual examples are
            MDX/TSX in `apps/docs-site/examples/`. Component folders
            contain only `{Component}.tsx`, `{Component}.test.tsx`, and
            `index.ts` — that's the full convention.

            **5. v0 changeset policy.** All publishable packages are at
            `0.0.x`. The repo's explicit policy is **every changeset
            stays `patch`** while in v0 — even for additive new exports
            and even when Changesets' workspace-peerDep rule auto-promotes
            to major. Do NOT flag patch-vs-minor severity. Do flag a
            missing changeset entirely (the `changeset-check` workflow
            handles structural absence; you can nudge if the body is
            empty or actively misleading).

            ## What to look for

            ### Must flag (high signal)

            1. **Bugs & logic errors.** Wrong state machines, broken
               controlled/uncontrolled handling, stale closures, race
               conditions, ref mutation during render in concurrent mode
               (use `useEffect` for prev-value tracking — in-render ref
               mutation is unsafe).
            2. **A11y regressions** (every component asserts `axe`
               violations === 0): missing accessible names on
               icon-only controls, duplicate landmarks with the same
               `aria-label`, nested-interactive elements, broken
               focus-trap, keyboard support gaps, `aria-expanded` paired
               with `aria-controls` pointing at conditionally-unmounted
               elements.
            3. **Security.** XSS via `dangerouslySetInnerHTML`,
               unsanitized URL inputs, secrets in logs, prototype
               pollution in object spreads, shell injection in CI
               scripts (use `execFileSync` with argv array, not
               `execSync` with template strings).

            ### Should flag (medium signal)

            4. **Repo conventions.** `forwardRef` on every component.
               `cva` for variant axes (no inline conditional classNames
               that should be variants). Tailwind utilities consume
               token CSS vars (`bg-accent`, `text-text-muted` — never
               raw hex). When extending `HTMLAttributes`, `Omit`
               conflicting props (`title`, `onSelect`, `values`, drag
               handlers). Import from package barrels, not
               implementation files. Tailwind data-attribute variants on
               descendants need `group` on the parent (Radix sets
               `data-state` on triggers, not children — bare
               `data-[state=open]:` on a child never matches).
            5. **Test coverage.** New components/patterns need: render
               happy path, every interactive behavior (prefer
               `userEvent`; `fireEvent` is allowed when there's a
               documented justification in a comment — e.g., Radix
               keyboard handlers that don't reach `userEvent` in jsdom),
               and an `axe` clean assertion. New hooks need
               `renderHook`. Tests for state-driven UI must verify
               post-mount transitions (e.g., re-render with a different
               prop and assert UI updates), not just first paint.
            6. **Public API hygiene.** Anything exported from
               `packages/*/src/index.ts` is a contract. Flag breaking
               renames / signature changes (the v0 patch policy means
               the bump level won't reflect this — call it out in the
               changeset *body*).

            ### Nit (only if unambiguous)

            7. **Changeset body quality.** If a changeset body claims an
               API that doesn't exist (e.g. compound sub-components
               that aren't on the component), call it out — it
               misleads CHANGELOG readers. Severity itself is policy
               (see hard rule #5); leave it alone.

            ## Tone

            Terse, engineer-grade, no hedging. When confident, say so.
            When uncertain, "could be wrong, but…" or skip. No
            "Great work!" / "Looks good!" padding — approving comments
            are noise.

            ## Summary structure

            Land the sticky summary in this shape — it's the format
            human reviewers find easiest to triage:

            ```
            ## What this PR does
            <2-4 lines on the cohesive change>

            ## Must fix
            <numbered list of items from the "Must flag" tier>

            ## Should fix
            <numbered list from "Should flag" tier>

            ## Nits
            <only if any, otherwise omit the section>

            ## What's solid
            <2-4 specific things done well; this calibrates trust>

            ---
            **<verdict>** — <one-line reason>
            ```

            Verdict is one of `LGTM`, `LGTM with nits`, `Needs work`.

            ## What NOT to comment on

            - Style nits Prettier / ESLint already covers
            - Tailwind class order (`prettier-plugin-tailwindcss` owns it)
            - The size of the diff — big PRs are fine when cohesive
            - Patch-vs-minor severity (see hard rule #5)
            - Missing `.stories.tsx` (see hard rule #4)
            - Anything you're <75% sure about (see hard rule #3)
