name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Granted to all jobs; some pipelines (snapshot, release, attestations) need
# `id-token: write` and `contents: read` is the minimum for checkout.
permissions:
  contents: read

env:
  # Disable Turbo telemetry in CI.
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  # ── Stage 1: linters that don't need a build ──────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm lint

  # ── Stage 2: workspace verification (typecheck + test + build) ────────────
  # Single job because turbo already parallelizes within a job and the
  # tasks share `^build` dependencies; splitting would force re-installs
  # and thrash the dependency cache.
  #
  # Matrix on Node versions because `engines.node: ">=20"` and the package
  # claims compatibility with Node 20, 22, and 24. Storybook + dist artifacts
  # only upload from the Node 24 leg (the default dev runtime, per `.nvmrc`)
  # so we don't ship N copies of the same bundle.
  verify:
    name: Typecheck · Test · Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node-version }}-
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Surface coverage as a PR artifact so reviewers can inspect uncovered
      # branches without having to re-run the suite locally. Only fired by the
      # vitest configs in `packages/*/vitest.config.ts`; `if-no-files-found:
      # ignore` keeps this step quiet when a package opts out.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-node${{ matrix.node-version }}
          path: packages/*/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: pnpm build

      # Surface the static Storybook from CI so the docs are inspectable on a PR.
      # Only upload from the canonical Node version to avoid N duplicate artifacts.
      - name: Upload Storybook artifact
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: storybook-static
          path: apps/docs/storybook-static
          retention-days: 14
          if-no-files-found: error

      # Ship the built lib bundles too — handy when reviewing dist-shape diffs.
      - name: Upload package dist artifacts
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package-dists
          path: |
            packages/tokens/dist
            packages/icons/dist
            packages/ui/dist
            packages/shipit/dist
          retention-days: 14
          if-no-files-found: error

  # ── Stage 3: Claude PR review (only after format + lint + verify pass) ────
  # Pairs with `claude.yml` (the reactive `@claude` mention handler).
  # Apply the `skip-claude` label to opt out of a specific PR.
  claude-review:
    name: Review with Claude
    needs: [format, lint, verify]
    runs-on: ubuntu-latest
    # Skip pushes to main, drafts, the auto-generated "Version Packages" PR,
    # dependabot/renovate mechanical bumps, and anything labelled `skip-claude`.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-claude') &&
      !startsWith(github.event.pull_request.title, 'chore(release): version packages') &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'renovate[bot]'
    permissions:
      contents: read
      pull-requests: write # post inline + summary review comments
      issues: read # read linked issues for context
      id-token: write # OIDC handshake with the Anthropic action
      actions: read # read prior CI runs to ground review feedback
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Full history so the action can compute a clean diff against the
          # base branch instead of a shallow shadow.
          fetch-depth: 0

      # The Claude action only runs against the workflow definition on the
      # default branch — a security measure so a PR can't modify the prompt
      # to exfiltrate secrets. If this PR touches `ci.yml` itself (the file
      # that defines this job), skip the review with an explanatory comment
      # instead of letting the action fail.
      - name: Detect changes to this workflow file
        id: workflow_check
        run: |
          base="${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "origin/$base...HEAD" -- .github/workflows/ci.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post skip notice (this workflow modified)
        if: steps.workflow_check.outputs.changed == 'true'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const marker = '<!-- claude-review-skip-workflow-changed -->';
            const body = [
              marker,
              '⏭️ **Claude review skipped on this PR**',
              '',
              'This PR modifies `.github/workflows/ci.yml`, the workflow that defines this review. The automated review only runs against the workflow definition on the default branch (a safety guard so a PR cannot rewrite its own reviewer prompt), so it is suppressed here.',
              '',
              'Once this PR is merged into `main`, future PRs will be reviewed against the updated workflow. You can mention `@claude` in a comment if you want a manual review on this PR.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Claude Code Review
        if: steps.workflow_check.outputs.changed != 'true'
        uses: anthropics/claude-code-action@8c196b2f61a66bfdf93322bde3a3e668669089ed # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use sticky_comment so subsequent pushes update the same review
          # summary thread instead of spamming a new top-level comment per
          # commit. Inline comments are landed via the github_inline_comment
          # MCP tool, which is allow-listed below.
          use_sticky_comment: true
          claude_args: |
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh run view:*),Bash(gh run list:*)"
          prompt: |
            Review this pull request as if you were the most senior engineer on
            the ShipIt design-system team. Use the GitHub MCP server's
            `create_inline_comment` tool to leave inline notes on specific
            lines; use a single sticky summary comment for high-level remarks.

            ## What this repo is

            A pnpm + turbo monorepo shipping four npm packages under
            `@ship-it-ui/*` (tokens, icons, ui, shipit) plus a Storybook docs
            app. Stack: React 18+, TypeScript 5.x, Tailwind v4 (beta),
            Radix UI primitives, `cva` for variants, `tsup` for library
            builds, Vitest + `vitest-axe` for tests.

            ## What to look for (in priority order)

            1. **Bugs & logic errors.** Off-by-one, wrong reducer state,
               race conditions, misuse of refs / effects, broken
               controlled/uncontrolled handling.
            2. **A11y regressions.** Every component asserts `axe`
               violations === 0 — flag anything that would break that
               (missing `aria-label` on icon-only controls, `role="grid"`
               without `role="row"` parents, nested-interactive, focus-trap
               misses, keyboard support gaps).
            3. **Security.** XSS via `dangerouslySetInnerHTML`, unsanitized
               URL inputs, leaking secrets in logs, prototype pollution in
               object spreads.
            4. **Repo conventions.** Components live in their own folder
               with `Component.tsx` + `.stories.tsx` + `.test.tsx` + `index.ts`.
               `forwardRef` everywhere. `cva` for variant axes. No inline
               conditional classNames — push them into `cva`. Tailwind
               utilities consume token CSS vars (`bg-accent`, never raw
               hex). When extending `HTMLAttributes`, `Omit` conflicting
               props (`title`, `onSelect`, `values`, drag handlers).
            5. **Test coverage.** New components / patterns must have
               tests covering: render happy path, every interactive
               behavior (with `userEvent`, never `fireEvent`), and an
               `axe` clean assertion. New hooks need a `renderHook` test.
            6. **Public API hygiene.** Anything exported from
               `packages/*/src/index.ts` is a contract — flag breaking
               renames / signature changes that lack a `major` changeset.
            7. **Changeset hygiene.** If `packages/*` source changed but
               no `.changeset/*.md` was added, point that out (the
               `changeset-check` workflow will already have flagged it,
               but the PR author may need a nudge on bump severity).

            ## Tone

            Terse, engineer-grade, no hedging. When you're confident, say
            so. When you're guessing, say "could be wrong, but…". Don't
            pad with "Great work!" / "Looks good!" — only flag real
            issues. Approving comments are noise.

            ## What NOT to comment on

            - Style nits the formatter / linter already covers. Prettier
              + eslint run before you do.
            - Tailwind class order — `prettier-plugin-tailwindcss` owns
              that.
            - Storybook story copy quality, unless it's actually
              misleading about the component's behavior.
            - The size of the diff. Big PRs are fine when they're
              cohesive.

            Land your final summary as the sticky review body. End with a
            one-line verdict: `LGTM`, `LGTM with nits`, or `Needs work`.
