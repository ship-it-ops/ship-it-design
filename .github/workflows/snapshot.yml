name: Snapshot release

# Cuts a one-off pre-release of every package the user has staged a changeset
# for. Versions look like `0.0.0-pr-42-20260430120000` and publish under the
# `pr-<number>` dist-tag, so consumers can install:
#
#   pnpm add @ship-it-ui/ui@pr-42
#
# Trigger by:
#   - Adding the `release: snapshot` label to a PR, OR
#   - Manually invoking via the Actions UI (workflow_dispatch).

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom dist-tag (defaults to "snapshot" off main, "pr-<number>" off a PR)'
        required: false
        default: ''

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # required for npm provenance
  pull-requests: write # so the install-instructions comment can land

jobs:
  publish:
    name: Publish snapshot
    runs-on: ubuntu-latest
    # On the `labeled` event, only run if the label that just landed is the trigger.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'release: snapshot')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - uses: ./.github/actions/setup

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build packages
        run: pnpm build --filter='./packages/*'

      - name: Resolve dist-tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=snapshot" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages (snapshot)
        # Stamps `0.0.0-<tag>-<timestamp>` versions on every package with a
        # pending changeset. Doesn't write to git; the bumped package.jsons
        # only exist for this run.
        run: pnpm changeset version --snapshot ${{ steps.tag.outputs.value }}

      - name: Publish snapshot
        run: pnpm changeset publish --tag ${{ steps.tag.outputs.value }} --no-git-tag
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Comment install instructions on the PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.value }}';
            const body = [
              '### 📦 Snapshot published',
              '',
              'Try this build with:',
              '',
              '```bash',
              `pnpm add @ship-it-ui/ui@${tag}`,
              `pnpm add @ship-it-ui/shipit@${tag}`,
              '```',
              '',
              `Full changeset: see the \`Snapshot release\` job on this commit.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
