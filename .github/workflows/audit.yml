name: Weekly audit

# Surfaces npm advisories and lockfile-dedupe drift on a cron so they don't
# wait until the next contributor stumbles on them. Runs as a non-blocking
# warning — the goal is visibility, not gating.
#
# Manual trigger (workflow_dispatch) is exposed for ad-hoc runs after a
# noisy advisory week or after a chunky dep bump.

on:
  # schedule:
  #   - cron: '0 12 * * 1' # Monday 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pnpm audit + dedupe check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup

      - name: pnpm audit (prod, high+)
        run: pnpm audit --prod --audit-level=high || echo "::warning::Audit found high+ vulns — review the log"

      - name: pnpm dedupe check
        run: pnpm dedupe --check || echo "::warning::Lockfile is not deduped — run pnpm dedupe locally"
