name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Read for checkout, write to land the "Version Packages" PR + git tags,
# pull-requests:write to open/update that PR, id-token:write to attach
# npm provenance signatures (proves the package was built by this workflow).
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Re-run the full CI gate (format, lint, typecheck, test, build) before
  # cutting a version PR or publishing. CI already runs on the same commit
  # via `ci.yml`, but we re-validate here so the release job can never run
  # against a regression — even if someone disabled CI required-checks or
  # the workflows fall out of sync.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  release:
    name: Version or publish
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      # `registry-url` makes setup-node write a project-scoped `.npmrc` that
      # picks up `NODE_AUTH_TOKEN` from the publish step's env — no token ever
      # touches `~/.npmrc` on disk. Mirrors `snapshot.yml` for symmetry.
      - uses: ./.github/actions/setup
        with:
          registry-url: 'https://registry.npmjs.org'

      # No explicit `pnpm build` step here — `pnpm release`
      # (`turbo run build --filter='./packages/*' && changeset publish`)
      # already builds before publishing. A second build would run for nothing.

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          # When there are pending changesets on `main`, opens / updates the
          # version PR. When the version PR is merged, runs `pnpm release`,
          # which publishes every bumped package to npm (with provenance) and
          # pushes the corresponding git tags.
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          # Attach a GitHub release per published package — pulls the body
          # from the matching CHANGELOG.md entry. Requires `contents: write`.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `setup-node` configured the project `.npmrc` with
          # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` — so we pass
          # the token only via env, never to disk. Some tooling still reads
          # `NPM_TOKEN`, so we expose both names pointing at the same secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Force npm provenance on the publish step so each tarball is
          # signed by this workflow's OIDC token.
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Summarize release
        if: ${{ steps.changesets.outputs.published == 'true' }}
        run: |
          echo "### 📦 Released the following packages" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | "- `\(.name)@\(.version)`"' >> "$GITHUB_STEP_SUMMARY"
