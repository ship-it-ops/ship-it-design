name: Setup
description: Install pnpm + Node, restore the dependency cache, install workspace dependencies.

# Reused by every workflow. Centralizes pnpm version, Node version, and the
# install command so we don't drift between CI / release / snapshot.

inputs:
  install:
    description: When 'true' (default), runs `pnpm install --frozen-lockfile`.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
